version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bewise
      POSTGRES_USER: bewise
      POSTGRES_PASSWORD: bewise
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_bewise:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: bewise
      POSTGRES_USER: bewise
      POSTGRES_PASSWORD: bewise
    ports:
      - "8000:8000"

volumes:
  postgres_data_bewise:

