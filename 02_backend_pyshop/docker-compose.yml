version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pyshop
      POSTGRES_USER: pyshop
      POSTGRES_PASSWORD: pyshop
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_pyshop:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: pyshop
      POSTGRES_USER: pyshop
      POSTGRES_PASSWORD: pyshop
    ports:
      - "8001:8000"

volumes:
  postgres_data_pyshop:

