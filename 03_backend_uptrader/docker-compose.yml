version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: uptrader
      POSTGRES_USER: uptrader
      POSTGRES_PASSWORD: uptrader
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_uptrader:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: uptrader
      POSTGRES_USER: uptrader
      POSTGRES_PASSWORD: uptrader
    ports:
      - "8002:8000"

volumes:
  postgres_data_uptrader:

