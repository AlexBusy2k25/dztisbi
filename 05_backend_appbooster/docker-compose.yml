version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: appbooster
      POSTGRES_USER: appbooster
      POSTGRES_PASSWORD: appbooster
    ports:
      - "5436:5432"
    volumes:
      - postgres_data_appbooster:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: appbooster
      POSTGRES_USER: appbooster
      POSTGRES_PASSWORD: appbooster
    ports:
      - "8004:8000"

volumes:
  postgres_data_appbooster:

